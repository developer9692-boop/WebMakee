<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎂 Happy Birthday!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;
    background:linear-gradient(135deg,#1a0533 0%,#3d0c5e 40%,#6b1fa3 100%);
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    position:relative;
  }

  /* ── Floating balloons ── */
  .balloons{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .balloon{
    position:absolute;bottom:-150px;
    width:50px;height:65px;
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    animation:floatUp linear infinite;
  }
  .balloon::after{
    content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
    width:1px;height:40px;background:rgba(255,255,255,.4);
  }
  .balloon:nth-child(1){background:#ff6b9d;left:5%;animation-duration:8s;animation-delay:0s;width:45px;height:58px}
  .balloon:nth-child(2){background:#ffd93d;left:15%;animation-duration:10s;animation-delay:1s}
  .balloon:nth-child(3){background:#6bcb77;left:28%;animation-duration:7s;animation-delay:2s;width:55px;height:70px}
  .balloon:nth-child(4){background:#4d96ff;left:42%;animation-duration:9s;animation-delay:0.5s}
  .balloon:nth-child(5){background:#ff6b6b;left:57%;animation-duration:11s;animation-delay:1.5s;width:40px;height:52px}
  .balloon:nth-child(6){background:#c77dff;left:70%;animation-duration:8s;animation-delay:3s}
  .balloon:nth-child(7){background:#ff9f43;left:83%;animation-duration:9s;animation-delay:0.8s;width:52px;height:67px}
  .balloon:nth-child(8){background:#48dbfb;left:93%;animation-duration:12s;animation-delay:2s}

  @keyframes floatUp{
    0%{bottom:-150px;opacity:0;transform:translateX(0) rotate(0deg)}
    10%{opacity:1}
    90%{opacity:1}
    100%{bottom:110%;opacity:0;transform:translateX(40px) rotate(15deg)}
  }

  /* ── Confetti ── */
  .confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .confetti{
    position:absolute;top:-20px;
    width:10px;height:10px;
    animation:confettiFall linear infinite;
  }
  @keyframes confettiFall{
    0%{top:-20px;opacity:1;transform:rotate(0deg) translateX(0)}
    100%{top:110vh;opacity:.5;transform:rotate(720deg) translateX(80px)}
  }

  /* ── Card ── */
  .card{
    position:relative;z-index:10;
    max-width:520px;margin:0 auto;
    padding:40px 30px;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:24px;
    animation:cardIn .8s ease;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

  .emoji-big{font-size:72px;animation:bounce 1s ease infinite alternate;filter:drop-shadow(0 0 20px rgba(255,200,0,.6))}
  @keyframes bounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-16px) scale(1.08)}}

  h1{
    font-family:'Pacifico',cursive;
    font-size:clamp(2rem,7vw,3rem);
    color:#fff;
    text-align:center;
    text-shadow:0 0 30px #ff6b9d,0 4px 8px rgba(0,0,0,.4);
    animation:glow 2s ease-in-out infinite alternate;
  }
  @keyframes glow{from{text-shadow:0 0 20px #ff6b9d}to{text-shadow:0 0 50px #ffd93d,0 0 80px #ff6b9d}}

  .name-tag{
    background:linear-gradient(135deg,#ff6b9d,#ffd93d);
    color:#1a0533;
    font-size:clamp(1.6rem,6vw,2.4rem);
    font-weight:700;
    padding:14px 36px;
    border-radius:50px;
    box-shadow:0 8px 32px rgba(255,107,157,.5);
    animation:pulse 1.5s ease infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

  .dob-badge{
    background:rgba(255,255,255,.12);
    border:2px solid rgba(255,255,255,.3);
    backdrop-filter:blur(10px);
    color:#fff;
    padding:10px 28px;
    border-radius:30px;
    font-size:1rem;
    letter-spacing:.05em;
  }

  .message{
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.2);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:24px 28px;
    color:#fff;
    text-align:center;
    font-size:1.05rem;
    line-height:1.7;
    max-width:420px;
  }

  .cake-row{font-size:2.5rem;letter-spacing:.3em;animation:spin3d 3s linear infinite}
  @keyframes spin3d{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}

  .stars{font-size:1.5rem;letter-spacing:.5em;animation:twinkle 1.5s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:1}50%{opacity:.3}}

  .share-btn{
    background:linear-gradient(135deg,#ff6b9d,#c77dff);
    color:#fff;
    border:none;
    padding:14px 36px;
    border-radius:50px;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 8px 32px rgba(199,125,255,.5);
    transition:transform .2s,box-shadow .2s;
    text-decoration:none;
    display:inline-block;
  }
  .share-btn:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(199,125,255,.7)}

  .age-counter{
    font-size:3.5rem;font-weight:700;
    background:linear-gradient(135deg,#ffd93d,#ff6b9d);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    animation:countUp .6s ease;
  }
  .age-label{color:rgba(255,255,255,.7);font-size:.9rem;margin-top:-8px}

  /* fireworks */
  .firework{
    position:fixed;pointer-events:none;z-index:5;
    width:6px;height:6px;border-radius:50%;
    animation:firework 1s ease-out forwards;
  }
  @keyframes firework{
    0%{transform:translate(0,0) scale(1);opacity:1}
    100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
  }
</style>
</head>
<body>

<div class="balloons">
  <div class="balloon"></div><div class="balloon"></div>
  <div class="balloon"></div><div class="balloon"></div>
  <div class="balloon"></div><div class="balloon"></div>
  <div class="balloon"></div><div class="balloon"></div>
</div>
<div class="confetti-container" id="confetti"></div>

<div class="card" id="card">
  <div class="emoji-big">🎂</div>
  <h1>Happy Birthday!</h1>
  <div class="name-tag" id="personName">...</div>
  <div class="dob-badge" id="dobBadge">🗓 Loading…</div>
  <div style="text-align:center">
    <div class="age-counter" id="ageNum">0</div>
    <div class="age-label">Years of Awesomeness 🎉</div>
  </div>
  <div class="cake-row">🎂🎁🎊🎈</div>
  <div class="message" id="message">
    Wishing you a day filled with love, laughter, and all your favourite things!
    May this special day bring endless joy. 🥳
  </div>
  <div class="stars">⭐✨🌟💫⭐✨</div>
  <button class="share-btn" onclick="share()">📤 Share This Page</button>
</div>

<script>
// ── read hash params ──
function getParams(){
  const hash = location.hash.slice(1);
  const p = {};
  new URLSearchParams(hash).forEach((v,k)=>p[k]=decodeURIComponent(v));
  return p;
}
const p = getParams();

// Name
document.getElementById('personName').textContent = p.name || 'Dear Friend';
document.title = `🎂 Happy Birthday ${p.name || ''}!`;

// DOB → age
if(p.dob){
  const [dd,mm,yyyy] = p.dob.split('-').map(Number);
  const dob = new Date(yyyy,mm-1,dd);
  const now  = new Date();
  let age    = now.getFullYear()-dob.getFullYear();
  if(now<new Date(now.getFullYear(),mm-1,dd)) age--;
  document.getElementById('dobBadge').textContent = `🗓 Born: ${p.dob}`;
  // animate age counter
  let c=0; const t=setInterval(()=>{
    document.getElementById('ageNum').textContent=++c;
    if(c>=age)clearInterval(t);
  },40);
}

// Confetti
const colors=['#ff6b9d','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff6b6b','#48dbfb'];
const cc=document.getElementById('confetti');
for(let i=0;i<60;i++){
  const el=document.createElement('div');
  el.className='confetti';
  el.style.cssText=`
    left:${Math.random()*100}%;
    width:${6+Math.random()*8}px;
    height:${6+Math.random()*8}px;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    border-radius:${Math.random()>0.5?'50%':'2px'};
    animation-duration:${3+Math.random()*5}s;
    animation-delay:${Math.random()*5}s;
  `;
  cc.appendChild(el);
}

// Fireworks
function launchFirework(){
  const num=12;
  for(let i=0;i<num;i++){
    const fw=document.createElement('div');
    fw.className='firework';
    const angle=(360/num)*i*(Math.PI/180);
    const dist=60+Math.random()*80;
    fw.style.cssText=`
      left:${Math.random()*90+5}%;
      top:${Math.random()*60+5}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
    `;
    document.body.appendChild(fw);
    setTimeout(()=>fw.remove(),1000);
  }
}
launchFirework();
setInterval(launchFirework,2500);

// Share
async function share(){
  if(navigator.share){
    await navigator.share({title:`Happy Birthday ${p.name||''}!`,url:location.href});
  } else {
    await navigator.clipboard.writeText(location.href);
    alert('Link copied! Share it with your loved one 💝');
  }
}
</script>
</body>
</html>
